services:
  db:
    image: pgvector/pgvector:pg16
    container_name: dealroom_db
    environment:
      POSTGRES_USER: dealroom
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dealroom
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealroom -d dealroom"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dealroom_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: dealroom_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: dealroom_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/dealroom-documents;
      mc policy set private local/dealroom-documents;
      echo 'MinIO bucket initialised';
      "

  vault:
    image: hashicorp/vault:1.15
    container_name: dealroom_vault
    cap_add: [IPC_LOCK]
    user: root
    entrypoint: ["vault"]
    command: ["server", "-config=/vault/config/config.hcl"]
    ports:
      - "8200:8200"
    environment:
      VAULT_ADDR: "http://0.0.0.0:8200"
    volumes:
      - ./vault/config.hcl:/vault/config/config.hcl:ro
      - vault_data:/vault/data
      - vault_init:/vault/init
    healthcheck:
      # Passes whether vault is unsealed, sealed, or uninitialised — just needs to be responding
      test: ["CMD-SHELL", "vault status 2>&1 | grep -q 'Initialized'"]
      interval: 5s
      timeout: 3s
      retries: 15

  mailhog:
    image: mailhog/mailhog:latest
    container_name: dealroom_mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — open http://localhost:8025 to see captured emails
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault-init:
    image: hashicorp/vault:1.15
    container_name: dealroom_vault_init
    user: root
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    volumes:
      - ./vault/init.sh:/vault/init.sh:ro
      - vault_init:/vault/init
    entrypoint: ["sh", "/vault/init.sh"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dealroom_backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      mailhog:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - ./backend:/app
      - ./ml:/app/ml

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: dealroom_worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - ./ml:/app/ml

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dealroom_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  db_data:
  redis_data:
  minio_data:
  vault_data:
  vault_init:
